name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '30 1 * * *' # Runs daily at 01:30 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue is stale because it has been open for 60 days with no activity.'
          close-issue-message: 'This issue was closed because it has been inactive for 7 days after being marked as stale.'
          stale-pr-message: 'This PR is stale because it has been open for 60 days with no activity.'
          close-pr-message: 'This PR was closed because it has been inactive for 7 days after being marked as stale.'
          days-before-issue-stale: 60
          days-before-issue-close: 7
