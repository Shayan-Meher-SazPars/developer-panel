version: 2
updates:
  - package-ecosystem: "pip" # For Python dependencies in requirements.txt
    directory: "/" # Look for requirements.txt in the root directory
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions" # Keep your GitHub Actions up-to-date
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
